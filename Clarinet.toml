[project]
name = 'bitharvest'
description = 'sBTC yield vault for Bitcoin holders'
authors = []
telemetry = false
cache_dir = './.cache'

# SIP-010 Fungible Token trait (testnet)
[[project.requirements]]
contract_id = "ST1NXBK3K5YYMD6FD41MVNP3JS1GABZ8TRVX023PT.sip-010-trait-ft-standard"

# sBTC Token dependency (testnet)
[[project.requirements]]
contract_id = "ST1F7QA2MDF17S807EPA36TSS8AMEFY4KA9TVGWXT.sbtc-token"

[contracts.bitharvest-vault]
path = 'contracts/bitharvest-vault.clar'
clarity_version = 4
epoch = 'latest'

[contracts.mock-sbtc]
path = 'contracts/mock-sbtc.clar'
clarity_version = 4
epoch = 'latest'

[repl.analysis]
passes = ['check_checker']

[repl.analysis.lints]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false

[repl.remote_data]
enabled = false
api_url = 'https://api.hiro.so'
